source = ~/.config/hypr/sakoora.hyprlock/colors-hyprlock.conf		# Replace with whichever color file you wish to import. Only $background, $foreground, $color1 and $color2 are used.
source = ~/.config/hypr/sakoora.hyprlock/style-2/sizes-hyprlock.conf		# NECESSARY for positioning and getting sizes of all elements.
$script_path = ~/.config/hypr/sakoora.hyprlock/style-2/scripts
$cache_path = ~/.cache/hyprlock-cache/style-2

animations {
enabled = true

bezier = easeOutQuint,0.23,1,0.32,1.0
bezier = almostLinear,0.5,0.5,0.75,1.0
bezier = stopGo,0.5,0,1.0,0.5

animation = inputFieldDots, 1, 10.21, easeOutQuint
animation = fadeIn, 1, 6.21, almostLinear
animation = fadeOut, 1, 7.21, stopGo
animation = inputFieldColors, 1, 5, easeOutQuint
}

background {
color = $background
}

# Right side gradient top
image {
path = $cache_path/gradient_top.png
size = $image_size
rounding = 0
border_size = 0
halign = right
valign = top
position = $gradient_top_offset
zindex = 0
}

# Right side gradient middle
image {
path = $cache_path/gradient_mid.png
size = $image_size
rounding = 0
border_size = 0
halign = right
valign = top
position = $gradient_mid_offset
zindex = 0
}

# Right side gradient bottom
image {
path = $cache_path/gradient_bot.png
size = $image_size
rounding = 0
border_size = 0
halign = right
valign = top
position = $gradient_bot_offset
zindex = 0
}

# Left top cut
image {
path = $cache_path/cut_0.png
size = $image_size
rounding = 0
border_size = 0
halign = left
valign = top
position = $cut_0_offset
zindex = 0
shadow_passes = 3
shadow_size = 5
shadow_boost = 0.6
}

# Left middle cut
image {
path = $cache_path/cut_1.png
size = $image_size
rounding = 0
border_size = 0
halign = left
valign = top
position = $cut_1_offset
zindex = 0
shadow_passes = 3
shadow_size = 5
shadow_boost = 0.6
}

# Left bottom cut
image {
path = $cache_path/cut_2.png
size = $image_size
rounding = 0
border_size = 0
halign = left
valign = top
position = $cut_2_offset
zindex = 0
shadow_passes = 3
shadow_size = 5
shadow_boost = 0.6
}

# Left text
label {
text = cmd[update:60000] echo "Theme: $(basename --suffix=.sakooratheme $(fd -e sakooratheme . $HOME/.config/hypr/themes))"		# Replace with desired text in case you're not using my dots
text_align = center
color = $color1
font_size = $body_font
font_family = Josefin Sans
position = $left_text_offset
halign = left
valign = top
zindex = 2
}

# Hostname
label {
text = cmd[update:60000] echo "<span letter_spacing=\"10240\">LOGGING ONTO $(cat /proc/sys/kernel/hostname)</span>"
text_align = center
color = $foreground
font_size = $body_font
font_family = Josefin Sans
position = $hostname_offset
halign = center
valign = center
zindex = 2
}

# Password field
input-field {
monitor =
size = $input_field_size
outline_thickness = 0
dots_center = true
inner_color = $color1
check_color = $foreground
check_text = 
fail_color = $color2
fail_text = 
font_family = Fira Code Nerd Font Mono
font_color = $background
swap_font_color = false
fade_on_empty = false
rounding = 40
placeholder_text = 
position = $input_field_offset
halign = center
valign = center
zindex = 2
}

# Who
label {
text = <b>Who</b>
text_align = left
color = $foreground
font_size = $body_font
font_family = Josefin Sans
position = $who_offset
halign = left
valign = center
zindex = 2
}

# Info
label {
text = <b>Info</b>
text_align = right
color = $foreground
font_size = $body_font
font_family = Josefin Sans
position = $info_offset
halign = right
valign = center
zindex = 2
}

# Username
label {
text = <span>$USER</span>
text_align = center
color = $foreground
font_size = $small_font
font_family = Josefin Sans
position = $username_offset
halign = left
valign = center
zindex = 1
}

# Info text 1
label {
text = cmd[update:1000] $script_path/info -1
text_align = right
color = $foreground
font_size = $small_font
font_family = Josefin Sans
position = $info_text_1_offset
halign = right
valign = center
zindex = 1
}

# Info text 2
label {
text = cmd[update:60000] $script_path/info -2
text_align = right
color = $foreground
font_size = $small_font
font_family = Josefin Sans
position = $info_text_2_offset
halign = right
valign = center
zindex = 1
} 

#Info text 3
label {
text = cmd[update:1000] $script_path/info -3
text_align = right
color = $foreground
font_size = $small_font
font_family = Josefin Sans
position = $info_text_3_offset
halign = right
valign = center
zindex = 1
}

# Circle
shape {
size = $circle_size
color = $color1
rounding = -1
halign = center
valign = center
position = $circle_offset
zindex = 2
}
